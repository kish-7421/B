<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>탄막 서바이벌 - 아레나 축소 버전</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #ui-container {
            width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            user-select: none;
        }
        .info-box {
            font-size: 20px;
            font-weight: bold;
        }
        #hp-wrapper {
            width: 250px;
            height: 20px;
            background-color: #333;
            border: 2px solid #fff;
            border-radius: 5px;
            overflow: hidden;
        }
        #hp-bar {
            width: 100%;
            height: 100%;
            background-color: #ff3333;
            transition: width 0.05s linear;
        }
        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        #overlay {
            position: absolute;
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        #restart-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #00f0ff;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        #restart-btn:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="info-box">TIME: <span id="timer-text">60.00</span>s</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span class="info-box">HP</span>
            <div id="hp-wrapper"><div id="hp-bar"></div></div>
        </div>
    </div>

    <div id="overlay">3</div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <button id="restart-btn" onclick="resetGame()">다시 도전하기</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerText = document.getElementById('timer-text');
        const hpBar = document.getElementById('hp-bar');
        const overlay = document.getElementById('overlay');
        const restartBtn = document.getElementById('restart-btn');

        // 🌟 파란 네모 틀 크기를 줄이고(360), 완벽히 중앙에 배치 (600px 캔버스 기준 여백 120px)
        const ARENA = { x: 120, y: 120, size: 360 }; 
        let gameState = 'countdown';
        let countdownValue = 3;
        let gameTime = 60.00; 
        let lastTime = 0;
        let spawnTimer = 0;
        let specialAttackTimer = 0;

        let player = {
            x: 300,
            y: 300,
            radius: 8,
            speed: 4.5,
            hp: 200,
            maxHp: 200
        };

        let keys = {};
        let isDragging = false;

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleStart(e) {
            if (gameState !== 'playing') return;
            const coords = getCanvasCoords(e);
            let dist = Math.hypot(coords.x - player.x, coords.y - player.y);
            if (dist < player.radius + 35) { 
                isDragging = true;
            }
        }

        function handleMove(e) {
            if (!isDragging || gameState !== 'playing') return;
            const coords = getCanvasCoords(e);
            player.x = coords.x;
            player.y = coords.y;
        }

        function handleEnd() {
            isDragging = false;
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        let projectiles = [];
        let particles = [];

        class Projectile {
            constructor(x, y, vx, vy, radius, color, type = 'normal') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
                this.color = color;
                this.type = type;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.type === 'curve') {
                    let speed = Math.hypot(this.vx, this.vy);
                    let angle = Math.atan2(this.vy, this.vx) + 0.015; 
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                }
            }

            draw() {
                ctx.save();
                if (this.type === 'ultimate') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function startCountdown() {
            gameState = 'countdown';
            countdownValue = 3;
            overlay.style.display = 'block';
            overlay.innerText = countdownValue;
            
            let interval = setInterval(() => {
                countdownValue--;
                if (countdownValue > 0) {
                    overlay.innerText = countdownValue;
                } else if (countdownValue === 0) {
                    overlay.innerText = "START!";
                } else {
                    clearInterval(interval);
                    overlay.style.display = 'none';
                    gameState = 'playing';
                    lastTime = performance.now();
                    requestAnimationFrame(gameLoop);
                }
            }, 1000);
        }

        function getRandomOuterPos() {
            const pad = 20;
            const side = Math.floor(Math.random() * 4);
            if (side === 0) return { x: Math.random() * canvas.width, y: -pad };
            if (side === 1) return { x: Math.random() * canvas.width, y: canvas.height + pad };
            if (side === 2) return { x: -pad, y: Math.random() * canvas.height };
            return { x: canvas.width + pad, y: Math.random() * canvas.height };
        }

        function spawnPattern(timeLeft) {
            // 1. 유도 탄막 (순차 발사)
            if (spawnTimer % 32 === 0) {
                let pos = getRandomOuterPos();
                let angle = Math.atan2(player.y - pos.y, player.x - pos.x);
                let speed = 3.5 + (60 - timeLeft) * 0.04; 
                projectiles.push(new Projectile(pos.x, pos.y, Math.cos(angle) * speed, Math.sin(angle) * speed, 6, '#ff4444'));
            }

            // 2. 주황색 곡선 탄막
            if (timeLeft < 50 && spawnTimer % 48 === 0) {
                let pos = getRandomOuterPos();
                let angle = Math.atan2(player.y - pos.y, player.x - pos.x);
                projectiles.push(new Projectile(pos.x, pos.y, Math.cos(angle) * 3, Math.sin(angle) * 3, 7, '#ffaa00', 'curve'));
            }

            // 3. 직선 칼날 탄막 (줄어든 아레나 크기에 맞춤형 리포지셔닝)
            if (spawnTimer % 160 === 0) {
                let side = Math.floor(Math.random() * 4);
                for (let i = 0; i < 3; i++) {
                    let x, y, vx, vy;
                    let offset = ARENA.x + (ARENA.size / 2) * i;
                    if (side === 0) { x = offset; y = -10; vx = 0; vy = 4.2; }
                    else if (side === 1) { x = offset; y = 610; vx = 0; vy = -4.2; }
                    else if (side === 2) { x = -10; y = offset; vx = 4.2; vy = 0; }
                    else { x = 610; y = offset; vx = -4.2; vy = 0; }
                    projectiles.push(new Projectile(x, y, vx, vy, 5, '#00ffcc'));
                }
            }

            // 4. 필살기 보이드 코어 연출 (15초 주기)
            if (Math.floor(timeLeft) % 15 === 0 && specialAttackTimer <= 0) {
                triggerSpecialAttack();
                specialAttackTimer = 180; 
            }
            if (specialAttackTimer > 0) specialAttackTimer--;
        }

        function triggerSpecialAttack() {
            let core = new Projectile(300, -30, 0, 1.5, 5, '#b000ff', 'ultimate');
            projectiles.push(core);

            let growInterval = setInterval(() => {
                if (gameState !== 'playing') { clearInterval(growInterval); return; }
                core.radius += 1.2;
                core.color = `hsl(${260 + core.radius}, 100%, 60%)`;
                
                if (core.radius >= 35) {
                    clearInterval(growInterval);
                    projectiles = projectiles.filter(p => p !== core); 
                    
                    for(let i=0; i<25; i++) {
                        particles.push({
                            x: core.x, y: core.y,
                            vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
                            radius: Math.random() * 5 + 2, color: '#e000ff', life: 25
                        });
                    }

                    let angle = 0;
                    let ringInterval = setInterval(() => {
                        if (gameState !== 'playing' || angle >= Math.PI * 2) { clearInterval(ringInterval); return; }
                        for(let j=0; j<3; j++) {
                            let currentAngle = angle + (j * (Math.PI * 2 / 3));
                            projectiles.push(new Projectile(
                                core.x, core.y, 
                                Math.cos(currentAngle) * 3.5, Math.sin(currentAngle) * 3.5, 
                                7, '#ffff00', 'ultimate'
                            ));
                        }
                        angle += 0.4;
                    }, 50);
                }
            }, 35);
        }

        function update(dt) {
            if (gameState !== 'playing') return;

            gameTime -= dt / 1000;
            if (gameTime <= 0) {
                gameTime = 0;
                gameState = 'victory';
                endGame("VICTORY! 완벽한 생존!");
                return;
            }
            timerText.innerText = gameTime.toFixed(2);

            if (!isDragging) {
                let dx = 0; let dy = 0;
                if (keys['arrowup'] || keys['w']) dy -= 1;
                if (keys['arrowdown'] || keys['s']) dy += 1;
                if (keys['arrowleft'] || keys['a']) dx -= 1;
                if (keys['arrowright'] || keys['d']) dx += 1;

                if (dx !== 0 || dy !== 0) {
                    let length = Math.hypot(dx, dy);
                    player.x += (dx / length) * player.speed;
                    player.y += (dy / length) * player.speed;
                }
            }

            // 수정된 아레나 테두리 충돌 및 벽 디버프 판정
            let touchingBorder = false;
            if (player.x - player.radius < ARENA.x) { player.x = ARENA.x + player.radius; touchingBorder = true; }
            if (player.x + player.radius > ARENA.x + ARENA.size) { player.x = ARENA.x + ARENA.size - player.radius; touchingBorder = true; }
            if (player.y - player.radius < ARENA.y) { player.y = ARENA.y + player.radius; touchingBorder = true; }
            if (player.y + player.radius > ARENA.y + ARENA.size) { player.y = ARENA.y + ARENA.size - player.radius; touchingBorder = true; }

            if (touchingBorder) {
                player.hp -= 0.3; 
            }

            spawnTimer++;
            spawnPattern(gameTime);

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.update();

                if (p.x < -120 || p.x > canvas.width + 120 || p.y < -120 || p.y > canvas.height + 120) {
                    projectiles.splice(i, 1);
                    continue;
                }

                let dist = Math.hypot(player.x - p.x, player.y - p.y);
                if (dist < player.radius + p.radius) {
                    if (p.type === 'ultimate') {
                        player.hp -= 30; 
                    } else {
                        player.hp -= 15; 
                    }
                    projectiles.splice(i, 1);

                    for(let k=0; k<8; k++){
                        particles.push({
                            x: player.x, y: player.y,
                            vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                            radius: Math.random() * 3 + 1, color: '#fff', life: 15
                        });
                    }
                }
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                pt.x += pt.vx; pt.y += pt.vy;
                pt.life--;
                if(pt.life <= 0) particles.splice(i, 1);
            }

            if (player.hp < 0) player.hp = 0;
            hpBar.style.width = `${(player.hp / player.maxHp) * 100}%`;

            if (player.hp <= 0) {
                gameState = 'gameover';
                endGame("GAME OVER.. 다시 도전해보세요!");
            }
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 🌟 600x600 화면 안에서 완벽하게 상하좌우 모든 변이 눈에 보이는 파란 네모 상자
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f0ff';
            ctx.strokeRect(ARENA.x, ARENA.y, ARENA.size, ARENA.size);
            ctx.shadowBlur = 0; 

            for (let p of projectiles) {
                p.draw();
            }

            for (let pt of particles) {
                ctx.fillStyle = pt.color;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI*2);
                ctx.fill();
            }

            if (player.hp > 0) {
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function gameLoop(timestamp) {
            if (gameState !== 'playing') return;
            let dt = timestamp - lastTime;
            if (dt > 100) dt = 16;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function endGame(msg) {
            overlay.style.display = 'block';
            overlay.style.fontSize = '30px';
            overlay.innerText = msg;
            restartBtn.style.display = 'block';
            isDragging = false;
        }

        function resetGame() {
            player.x = 300;
            player.y = 300;
            player.hp = 200; 
            gameTime = 60.00;
            spawnTimer = 0;
            specialAttackTimer = 0;
            projectiles = [];
            particles = [];
            keys = {};
            isDragging = false;
            
            hpBar.style.width = '100%';
            timerText.innerText = "60.00";
            overlay.style.fontSize = '80px';
            restartBtn.style.display = 'none';
            
            startCountdown();
        }

        startCountdown();
    </script>
</body>
</html>
